---
- name: Konfiguracja serwera WWW Apache
  hosts: webservers
  become: yes

  tasks:
    - name: Aktualizacja cache apt i instalacja Apache2
      apt:
        name: apache2
        state: present
        update_cache: yes

    - name: Upewnienie sie, ze Apache2 dziala i startuje z systemem
      service:
        name: apache2
        state: started
        enabled: yes

    - name: Podmiana strony glownej index.html
      copy:
        dest: /var/www/html/index.html
        content: |
          <!DOCTYPE html>
          <html lang="pl">
          <head>
              <meta charset="UTF-8">
              <title>IaC Cloud Lab</title>
              <style>
                  body {
                      background-color: #1a1a1a;
                      color: #ffbf00;
                      font-family: monospace;
                      padding: 50px;
                  }
                  h1 {
                      border-bottom: 2px solid #ffbf00;
                      padding-bottom: 10px;
                  }
                  .box {
                      border: 1px solid #ffbf00;
                      padding: 20px;
                      margin-top: 20px;
                  }
              </style>
          </head>
          <body>
              <h1>IaC Cloud Lab</h1>
              <div class="box">
                  <p>Infrastruktura pobrana z: GitHub</p>
                  <p>Aprowizacja zasobów: Terraform</p>
                  <p>Konfiguracja systemu: Ansible</p>
                  <p>Status: Sukces</p>
              </div>
          </body>
          </html>
        owner: root
        group: root
        mode: '0644'
